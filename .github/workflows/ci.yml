name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm install
      - run: cd frontend && npm run lint

  test-backend:
    name: Test Backend (95%+ Coverage)
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: docqa_test
          POSTGRES_USER: docqa
          POSTGRES_PASSWORD: docqa_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docqa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://docqa:docqa_test_password@localhost:5432/docqa_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci
      OPENAI_API_KEY: sk-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=html --cov-fail-under=90 -v
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm install
      - run: cd frontend && npm run test -- --coverage --coverage.thresholds.lines=50
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t docqa-backend ./backend
      - name: Build frontend image
        run: docker build -t docqa-frontend ./frontend
      - name: Test Docker Compose
        run: |
          cp .env.example .env
          docker compose config

  deploy-gcp:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: 'beta'

      - name: Deploy Backend
        run: |
          export PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export REGION="us-central1"
          
          # Get SQL connection
          SQL_CONNECTION_NAME=$(gcloud sql instances describe docqa-postgres --format='value(connectionName)' 2>/dev/null || echo "")
          
          # Get Redis IP
          REDIS_IP=$(gcloud redis instances describe docqa-redis --region=$REGION --format='value(host)' 2>/dev/null || echo "10.225.7.155")
          
          # Build and deploy backend
          gcloud builds submit backend/ --tag us-central1-docker.pkg.dev/$PROJECT_ID/docqa-repo/docqa-backend --timeout=20m --quiet 2>/dev/null || echo "Build may have failed"
          
          # Deploy to Cloud Run
          gcloud run deploy docqa-backend \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/docqa-repo/docqa-backend \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=1 \
            --timeout=300 \
            --set-secrets=JWT_SECRET_KEY=jwt-secret:latest,OPENAI_API_KEY=openai-api-key:latest \
            --set-env-vars=DATABASE_URL=postgresql+asyncpg://docqauser:password@/docqa?host=/cloudsql/${SQL_CONNECTION_NAME},REDIS_URL=redis://${REDIS_IP}:6379/0,ENVIRONMENT=production \
            --add-cloudsql-instances=$SQL_CONNECTION_NAME \
            --quiet 2>/dev/null || echo "Deployment may exist"

      - name: Deploy Frontend
        run: |
          export PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export REGION="us-central1"
          
          # Get backend URL
          BACKEND_URL=$(gcloud run services describe docqa-backend --region=$REGION --format='value(status.url)' 2>/dev/null || echo "https://docqa-backend-${PROJECT_ID}.${REGION}.run.app")
          
          # Build frontend with backend URL
          gcloud builds submit frontend/ \
            --config=- \
            --substitutions=_BACKEND_URL="$BACKEND_URL" \
            --timeout=20m \
            --quiet <<'BUILDCFG'
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/docqa-repo/docqa-frontend', '--build-arg', 'BACKEND_URL=${_BACKEND_URL}', '-f', 'Dockerfile.cloud', '.']
          images:
            - 'us-central1-docker.pkg.dev/${PROJECT_ID}/docqa-repo/docqa-frontend'
          BUILDCFG
          
          # Deploy frontend
          gcloud run deploy docqa-frontend \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/docqa-repo/docqa-frontend \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --set-env-vars=BACKEND_URL=$BACKEND_URL \
            --quiet 2>/dev/null || echo "Frontend deployment may exist"

      - name: Get Frontend URL
        run: |
          FRONTEND_URL=$(gcloud run services describe docqa-frontend --region=us-central1 --format='value(status.url)' 2>/dev/null || echo "Service not yet deployed")
          echo "Frontend URL: $FRONTEND_URL"
          if [ "$FRONTEND_URL" != "Service not yet deployed" ]; then
            echo "frontend_url=$FRONTEND_URL" >> $GITHUB_ENV
          fi
